<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Admin - Elane Modas</title>
    <link rel="stylesheet" href="css/dashboard.css">
</head>
<body>

    <div class="main-header">
        <a href="index.html" class="home-link"><span>⬅️</span> Início</a>
        <h1>Elane Modas</h1>
        <div class="slogan">A sua Loja de Moda</div>
    </div>

    <div class="login-wrapper" id="login-screen">
        <div class="login-box">
            <h3>Acesso Restrito Admin</h3>
            <input type="text" id="username" placeholder="Usuário">
            <input type="password" id="password" placeholder="Senha">
            <button onclick="autenticar()" id="btn-login">Entrar no Dashboard</button>
            <div class="error-msg" id="error-message">Usuário ou senha incorretos!</div>
        </div>
    </div>

    <div class="container hidden" id="dashboard-content">
        
        <div class="dashboard-controls">
            <div class="tabs">
                <button class="tab-btn active" onclick="mudarAba('resultados')" id="tab-resultados">📊 Resultados NPS</button>
                <button class="tab-btn" onclick="mudarAba('equipe')" id="tab-equipe">👥 Equipe</button>
                <button class="tab-btn" onclick="mudarAba('usuarios')" id="tab-usuarios">🔐 Acessos</button>
            </div>
            <button class="logout-btn" onclick="logout()">Sair do Sistema</button>
        </div>
        
        <div id="secao-resultados">
            <div id="loading-nps" style="display:none;">Carregando avaliações do Firebase...</div>
            <div class="grid" id="dashboard-grid"></div>
        </div>

        <div id="secao-equipe" class="hidden">
            <div class="admin-panel">
                <div class="form-box" id="form-box-container">
                    <h3 id="form-titulo">Novo Colaborador</h3>
                    <form id="form-add-colab">
                        <div class="form-group"><label>Nome Completo</label><input type="text" id="colab-nome" required></div>
                        <div class="form-group"><label>Cargo / Setor</label><input type="text" id="colab-cargo" required></div>
                        <div class="form-group"><label>Foto <span id="foto-hint">(Opcional)</span></label><input type="file" id="colab-foto" accept="image/png, image/jpeg, image/jpg"></div>
                        <div class="btn-group">
                            <button type="submit" class="btn-submit-colab" id="btn-save-colab">Salvar Colaborador</button>
                            <button type="button" class="btn-cancel" id="btn-cancel-edit" onclick="cancelarEdicao()">Cancelar</button>
                        </div>
                    </form>
                </div>
                <div class="list-box">
                    <h3>Equipe Atual</h3>
                    <div id="loading-equipe" style="display:none;">Carregando equipe...</div>
                    <div class="team-list" id="team-list-container"></div>
                </div>
            </div>
        </div>

        <div id="secao-usuarios" class="hidden">
            <div class="admin-panel">
                <div class="form-box" id="form-user-container">
                    <h3 id="form-user-titulo">Novo Usuário</h3>
                    <form id="form-add-user">
                        <div class="form-group"><label>Nome da Pessoa</label><input type="text" id="user-nome" required></div>
                        <div class="form-group"><label>Login de Acesso</label><input type="text" id="user-login" required></div>
                        <div class="form-group"><label>Senha</label><input type="text" id="user-senha" required></div>
                        <div class="form-group">
                            <label>Perfil de Acesso</label>
                            <select id="user-perfil" required>
                                <option value="gerente">Gerente (Acesso ao Dashboard e Pesquisa)</option>
                                <option value="consultor">Consultor (Acesso apenas à Pesquisa)</option>
                            </select>
                        </div>
                        <div class="btn-group">
                            <button type="submit" class="btn-submit-colab" id="btn-save-user">Salvar Usuário</button>
                            <button type="button" class="btn-cancel" id="btn-cancel-user-edit" onclick="cancelarEdicaoUsuario()">Cancelar</button>
                        </div>
                    </form>
                </div>
                <div class="list-box">
                    <h3>Usuários com Acesso</h3>
                    <div id="loading-usuarios" style="display:none;">Carregando usuários...</div>
                    <div class="team-list" id="user-list-container"></div>
                </div>
            </div>
        </div>
    </div>

    <div id="custom-alert-modal" class="modal-overlay hidden">
        <div class="modal-box">
            <span class="modal-close" onclick="fecharAlerta()">&times;</span>
            <div id="alert-icon" style="font-size: 30px; margin-bottom: 10px;">⚠️</div>
            <p class="modal-msg" id="alert-message">Mensagem aqui.</p>
            <button class="btn-modal-ok" onclick="fecharAlerta()">Entendi</button>
        </div>
    </div>
    <div id="custom-confirm-modal" class="modal-overlay hidden">
        <div class="modal-box">
            <span class="modal-close" onclick="fecharConfirmacao()">&times;</span>
            <div style="font-size: 30px; margin-bottom: 10px;">❓</div>
            <p class="modal-msg" id="confirm-message">Tem certeza?</p>
            <div class="btn-group">
                <button class="btn-modal-cancel" onclick="fecharConfirmacao()">Cancelar</button>
                <button class="btn-modal-danger" id="btn-confirm-action">Sim, Excluir</button>
            </div>
        </div>
    </div>
    <script type="module" src="js/dashboard.js"></script>
</body>
</html>
