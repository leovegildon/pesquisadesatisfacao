<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avaliação Elane Modas</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f8f9fa; text-align: center; margin: 0; padding-bottom: 40px; }
        .hidden { display: none !important; }

        .login-wrapper { display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; box-sizing: border-box; background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%); }
        .login-box { background: white; padding: 40px 30px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); text-align: center; width: 100%; max-width: 340px; animation: popIn 0.4s ease; }
        @keyframes popIn { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        
        .login-box h3 { margin-top: 0; margin-bottom: 10px; color: #333; font-size: 22px; }
        .login-box p { color: #666; font-size: 14px; margin-bottom: 25px; line-height: 1.4; }
        .login-box input { width: 100%; padding: 14px; margin-bottom: 15px; border: 2px solid #e0e0e0; border-radius: 8px; box-sizing: border-box; font-size: 15px; transition: 0.3s; outline: none; }
        .login-box input:focus { border-color: #007bff; }
        .login-box button { background: #007bff; color: white; border: none; padding: 14px; font-size: 16px; font-weight: bold; border-radius: 8px; cursor: pointer; width: 100%; transition: 0.3s; }
        .login-box button:hover { background: #0056b3; transform: translateY(-2px); }
        .error-msg { color: #dc3545; font-size: 14px; margin-top: 15px; display: none; font-weight: bold; }

        .main-header { background: linear-gradient(135deg, #0056b3 0%, #00a8ff 100%); color: white; padding: 40px 20px 50px 20px; margin-bottom: -25px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border-bottom-left-radius: 30px; border-bottom-right-radius: 30px; position: relative; }
        .main-header h1 { margin: 0; font-size: 32px; font-weight: 800; letter-spacing: 1px; }
        .main-header .slogan { font-size: 13px; opacity: 0.85; margin-top: 2px; margin-bottom: 25px; text-transform: uppercase; letter-spacing: 3px; }
        .main-header .pergunta-box { display: inline-block; background: rgba(255, 255, 255, 0.15); backdrop-filter: blur(8px); padding: 12px 30px; border-radius: 50px; border: 1px solid rgba(255, 255, 255, 0.2); }
        .main-header h2 { margin: 0; font-size: 20px; font-weight: 500; }

        .admin-link { position: absolute; top: 20px; right: 20px; background: rgba(255, 255, 255, 0.15); color: white; text-decoration: none; padding: 8px 16px; border-radius: 20px; font-size: 13px; font-weight: bold; border: 1px solid rgba(255, 255, 255, 0.3); transition: all 0.3s ease; display: flex; align-items: center; gap: 6px; }
        .admin-link:hover { background: rgba(255, 255, 255, 0.3); transform: translateY(-2px); }

        .logout-link { position: absolute; top: 20px; left: 20px; background: rgba(255, 255, 255, 0.15); color: white; text-decoration: none; padding: 8px 16px; border-radius: 20px; font-size: 13px; font-weight: bold; border: 1px solid rgba(255, 255, 255, 0.3); transition: all 0.3s ease; cursor: pointer; }
        .logout-link:hover { background: rgba(255, 255, 255, 0.3); }

        .grid { display: flex; justify-content: center; gap: 30px; flex-wrap: wrap; max-width: 800px; margin: 0 auto; position: relative; z-index: 10; padding: 0 20px; }
        .colaborador-card { background: white; padding: 25px 20px; border-radius: 16px; box-shadow: 0 8px 25px rgba(0,0,0,0.08); cursor: pointer; transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); width: 170px; text-decoration: none; color: inherit; display: flex; flex-direction: column; align-items: center; }
        .colaborador-card:hover { transform: translateY(-8px); box-shadow: 0 12px 30px rgba(0,0,0,0.12); }
        .foto { width: 110px; height: 110px; border-radius: 50%; object-fit: cover; margin-bottom: 15px; border: 4px solid #f8f9fa; box-shadow: 0 4px 10px rgba(0,0,0,0.1); transition: 0.3s; }
        .colaborador-card:hover .foto { border-color: #007bff; }
        .nome { font-size: 18px; font-weight: bold; color: #333; text-align: center; }
        .cargo { font-size: 14px; color: #777; margin-top: 5px; text-align: center; }
    </style>
</head>
<body>

    <div class="login-wrapper" id="login-screen">
        <div class="login-box">
            <div style="font-size: 45px; margin-bottom: 15px;">🔒</div>
            <h3>Acesso à Pesquisa</h3>
            <p>Faça login com seu usuário para iniciar as avaliações.</p>
            <input type="text" id="username" placeholder="Usuário">
            <input type="password" id="password" placeholder="Senha" onkeypress="if(event.key === 'Enter') autenticar()">
            <button onclick="autenticar()" id="btn-login">Acessar Sistema</button>
            <div class="error-msg" id="error-message">Usuário ou senha incorretos!</div>
        </div>
    </div>
    
    <div id="main-content" class="hidden">
        <div class="main-header">
            <span class="logout-link" onclick="logout()">⬅️ Sair</span>
            
            <a href="dashboard.html" class="admin-link" id="btn-dashboard">
                <span>⚙️</span> Dashboard
            </a>

            <h1>Elane Modas</h1>
            <div class="slogan">A sua Loja de Modas</div>
            
            <div class="pergunta-box">
                <h2>Quem lhe atendeu hoje?</h2>
            </div>
        </div>
        
        <div class="grid" id="grid-colaboradores"></div>
    </div>

    <!-- Importação do Firebase -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // =========================================================
        // Autenticação Firebase
        // =========================================================
        const firebaseConfig = {
                apiKey: "AIzaSyCzZMFsQepPQcagU14TH3Ag2oeZcJ7lav0",
                authDomain: "pesquisadesatisfacao-3d499.firebaseapp.com",
                projectId: "pesquisadesatisfacao-3d499",
                storageBucket: "pesquisadesatisfacao-3d499.firebasestorage.app",
                messagingSenderId: "659023601137",
                appId: "1:659023601137:web:c786f5e291c10fddb4b850",
                measurementId: "G-XZSNL37MM5"
                };

        // =========================================================

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

    

        window.autenticar = async function() {
            const userIn = document.getElementById('username').value;
            const passIn = document.getElementById('password').value;
            const errorDiv = document.getElementById('error-message');
            const btnLogin = document.getElementById('btn-login');

            btnLogin.innerText = "Verificando..."; btnLogin.disabled = true;

            try {
                const q = query(collection(db, "usuarios"), where("login", "==", userIn), where("senha", "==", passIn));
                const snapshot = await getDocs(q);

                if (!snapshot.empty) {
                    const dadosUsuario = snapshot.docs[0].data();
                    const perfil = dadosUsuario.perfil || 'gerente';
                    concluirLogin(perfil);
                } else {
                    errorDiv.innerText = "Usuário ou senha incorretos!"; errorDiv.style.display = 'block';
                }
            } catch (error) {
                errorDiv.innerText = "Erro de conexão. Verifique a internet."; errorDiv.style.display = 'block';
            }

            btnLogin.innerText = "Acessar Sistema"; btnLogin.disabled = false;
        };

        function concluirLogin(perfil) {
            sessionStorage.setItem('leovtech_auth', 'true');
            sessionStorage.setItem('leovtech_role', perfil);
            iniciarSistema();
        }

        window.logout = function() {
            sessionStorage.removeItem('leovtech_auth');
            sessionStorage.removeItem('leovtech_role');
            location.reload();
        };

        if (sessionStorage.getItem('leovtech_auth') === 'true') {
            iniciarSistema();
        }

        function iniciarSistema() {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('main-content').classList.remove('hidden');
            
            // Controle de Acesso: Oculta o botão Dashboard se for Consultor
            if (sessionStorage.getItem('leovtech_role') === 'consultor') {
                document.getElementById('btn-dashboard').style.display = 'none';
            }

            carregarColaboradores();
        }

        async function carregarColaboradores() {
            const grid = document.getElementById('grid-colaboradores');
            try {
                const q = query(collection(db, "colaboradores"), where("status", "==", "ativo"));
                const querySnapshot = await getDocs(q);

                grid.innerHTML = ''; 
                if (querySnapshot.empty) { grid.innerHTML = '<p style="color: #666; width: 100%; text-align: center;">Nenhum colaborador ativo encontrado.</p>'; return; }

                querySnapshot.forEach((doc) => {
                    const dados = doc.data(); const nome = dados.nome || 'Desconhecido'; const cargo = dados.cargo || '';
                    const fotoFallback = `https://ui-avatars.com/api/?name=${encodeURIComponent(nome)}&background=random&color=fff`;
                    const fotoUrl = dados.fotoUrl || fotoFallback;

                    const card = document.createElement('a');
                    card.href = `pesquisa.html?colab=${encodeURIComponent(nome)}`;
                    card.className = 'colaborador-card';
                    card.innerHTML = `<img src="${fotoUrl}" class="foto" onerror="this.src='${fotoFallback}'"><div class="nome">${nome}</div><div class="cargo">${cargo}</div>`;
                    grid.appendChild(card);
                });
            } catch (error) { grid.innerHTML = '<p style="color: red; width: 100%; text-align: center;">Erro de conexão.</p>'; }
        }
    </script>
</body>
</html>
