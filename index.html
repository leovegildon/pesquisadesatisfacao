<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avaliação Elane Modas</title>
    <link rel="stylesheet" href="css/index.css">
</head>
<body>

    <div class="login-wrapper" id="login-screen">
        <div class="login-box">
            <div style="font-size: 45px; margin-bottom: 15px;">🔒</div>
            <h3>Acesso à Pesquisa</h3>
            <p>Faça login com seu usuário para iniciar as avaliações.</p>
            <input type="text" id="username" placeholder="Usuário">
            <input type="password" id="password" placeholder="Senha" onkeypress="if(event.key === 'Enter') autenticar()">
            <button onclick="autenticar()" id="btn-login">Acessar Sistema</button>
            <div class="error-msg" id="error-message">Usuário ou senha incorretos!</div>
        </div>
    </div>
    
    <div id="main-content" class="hidden">
        <div class="main-header">
            <span class="logout-link" onclick="logout()">⬅️ Sair</span>
            
            <a href="dashboard.html" class="admin-link" id="btn-dashboard">
                <span>⚙️</span> Admin
            </a>

            <h1>Elane Modas</h1>
            <div class="slogan">A sua Loja de Modas</div>
            
            <div class="pergunta-box">
                <h2>Quem lhe atendeu hoje?</h2>
            </div>
        </div>
        
        <div class="grid" id="grid-colaboradores"></div>
    </div>

    <script type="module" src="js/index.js"></script>
</body>
</html>
